<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: #202124;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 12px 16px 8px;
        border-bottom: 1px solid #e0e0e0;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
      }
      .msg {
        margin-bottom: 12px;
        white-space: pre-wrap;
        line-height: 1.4;
      }
      .msg .who {
        font-size: 11px;
        font-weight: 600;
        color: #5f6368;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 2px;
      }
      .msg.user .who { color: #1a73e8; }
      .msg.assistant .who { color: #188038; }
      .msg.error { color: #c5221f; }
      footer {
        padding: 8px 12px;
        border-top: 1px solid #e0e0e0;
        display: flex;
        gap: 6px;
      }
      textarea {
        flex: 1;
        resize: none;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid #c0c0c0;
        border-radius: 4px;
        min-height: 36px;
        max-height: 120px;
      }
      button {
        font: inherit;
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        background: #1a73e8;
        color: white;
        cursor: pointer;
      }
      button:disabled {
        background: #9aa0a6;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <header><h1>Podium Assistant</h1></header>
    <div id="log"></div>
    <footer>
      <textarea id="input" placeholder="Message…" rows="1"></textarea>
      <button id="send">Send</button>
    </footer>
    <script>
      const history = [];
      const log = document.getElementById('log');
      const input = document.getElementById('input');
      const send = document.getElementById('send');

      function append(role, text, cls) {
        const div = document.createElement('div');
        div.className = 'msg ' + (cls || role);
        const who = document.createElement('div');
        who.className = 'who';
        who.textContent = role;
        const body = document.createElement('div');
        body.textContent = text;
        div.appendChild(who);
        div.appendChild(body);
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        return body;
      }

      function setBusy(busy) {
        send.disabled = busy;
        input.disabled = busy;
        send.textContent = busy ? '…' : 'Send';
      }

      function submit() {
        const text = input.value.trim();
        if (!text) return;
        append('user', text);
        history.push({ role: 'user', content: text });
        input.value = '';
        setBusy(true);
        google.script.run
          .withSuccessHandler(function (result) {
            history.length = 0;
            Array.prototype.push.apply(history, result.history);
            append('assistant', result.reply);
            setBusy(false);
            input.focus();
          })
          .withFailureHandler(function (err) {
            append('error', String(err && err.message || err), 'error');
            history.pop();
            setBusy(false);
            input.focus();
          })
          .sendMessage(history);
      }

      send.addEventListener('click', submit);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          submit();
        }
      });
      input.focus();
    </script>
  </body>
</html>
